name: Monthly Org Chart Regeneration

on:
  schedule:
    # 1st of every month at midnight UTC
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Regenerate org chart HTML
        run: python generate_org_html.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add org_drilldown.html org_drilldown_redacted.html
          git commit -m "Regenerate org chart HTML (monthly)"
          git push
